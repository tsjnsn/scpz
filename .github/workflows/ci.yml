name: CI

on:
  push:
    branches: [main, dev-ai]
  pull_request:
    branches: [main, dev-ai]
  merge_group:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Mypy
        run: uv run mypy src/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest --cov=scpz --cov-report=term-missing -v --ignore=tests/test_golden_regression.py

      - name: Check SCP fixtures are valid JSON
        run: |
          for f in tests/fixtures/*.json; do
            python -m json.tool "$f" > /dev/null
          done

      - name: Check schema is up to date
        run: |
          uv run scpz print-schema | diff - schema/OptimizerConfig.json || \
            (echo "schema/OptimizerConfig.json is out of date. Run: scpz print-schema -o schema/OptimizerConfig.json" && exit 1)

  docs:
    name: Documentation site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install docs dependencies
        run: uv sync --group docs

      - name: Build MkDocs site
        run: uv run mkdocs build --strict

  equivalence-golden:
    name: Equivalence golden regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Run optimize + equivalence golden tests
        run: uv run pytest tests/test_golden_regression.py -v

  container:
    name: Container image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (CI)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: scpz:ci

      - name: Smoke test CLI in container
        run: |
          docker run --rm scpz:ci --version
          docker run --rm scpz:ci optimize --help > /dev/null
