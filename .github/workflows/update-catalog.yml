name: Update AWS action catalog

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Run update script
        run: python scripts/update_catalog.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/scpz/data/aws_actions.json \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open PR if catalog changed
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update AWS action catalog"
          branch: chore/update-aws-catalog
          delete-branch: true
          title: "chore: update AWS action catalog"
          body: |
            Automated weekly refresh of `src/scpz/data/aws_actions.json`
            from the AWS Service Reference API
            (`https://servicereference.us-east-1.amazonaws.com/`).

            Review the diff to confirm the changes look reasonable before merging.
          labels: automated, dependencies
