# Kitchen-sink reference configuration for scpz.
# Every supported option is shown with its default value and all valid choices.
# Planned (not yet implemented) options are shown commented out.
#
# To validate your own scpz.yaml against the JSON Schema:
#   scpz schema | python -m jsonschema - --instance your-scpz.yaml
#
# To regenerate the committed schema after model changes:
#   scpz schema -o schema/OptimizerConfig.json

apiVersion: scpz.io/v1alpha1
kind: OptimizerConfig
metadata:
  name: examples
  # labels and annotations are ignored but allowed for team workflows,
  # e.g. to tag configs by environment or owning team.
  # labels:
  #   env: production
  #   team: security

spec:

  # ── Action catalog ─────────────────────────────────────────────────
  # Enables catalog-aware wildcard compression in conservative mode.
  # When the catalog confirms that every action matching a verb-level
  # wildcard (e.g. iam:Delete*) is already listed in the statement,
  # it is safe to emit the wildcard — zero scope broadening.
  # Without a catalog, the conservative LCP heuristic is the only safety net.
  #
  # The bundled catalog is refreshed weekly from the AWS Service Reference API
  # (https://servicereference.us-east-1.amazonaws.com/) and committed to the
  # repo.  Run `python scripts/update_catalog.py` to refresh it manually.
  catalog:
    source: bundled       # bundled | file | none
                          #   bundled - catalog shipped with scpz (default)
                          #   file    - load from a local JSON file
                          #   none    - disable catalog; fall back to LCP only
    path: null            # path to catalog file; only used when source: file
                          # e.g. path: ./my-aws-actions.json

  # ── Optimizer passes ───────────────────────────────────────────────
  # Each pass has an `enabled` key. Set `enabled: false` to disable a pass
  # while keeping its other args in place. Omitting a pass key entirely uses
  # that pass's built-in defaults (enabled: true for most; enabled: false for
  # redundancyEliminate, which is opt-in).
  # Passes run in the fixed order listed below regardless of key order here.
  optimizer:

    # Combines statements that share the same Effect, Condition, and Resource
    # by unioning their Action lists. Reduces statement count — the most
    # impactful optimization for policies near the 5-statement limit.
    statementMerge:
      enabled: true
      sidOnMerge: first       # drop | first | join | joinTruncate
                              #   drop         - omit Sid (fewest bytes)
                              #   first        - keep first statement's Sid
                              #   join         - concatenate Sids with separator
                              #   joinTruncate - join then truncate to maxLength
      sidJoinSeparator: "+"
      sidJoinMaxLength: 64

    # Replaces groups of actions sharing a common sub-prefix with a wildcard.
    # conservative mode requires the LCP to extend beyond the verb prefix
    # (e.g. iam:DeleteRole* not iam:Delete*) to avoid broadening scope.
    # aggressive mode wildcards at verb level — more savings, broader scope.
    actionCompress:
      enabled: true
      mode: conservative      # conservative | aggressive

    # Deduplicates condition values and merges equivalent condition blocks
    # within each statement.
    conditionMerge:
      enabled: true

    # Collapses ARN lists into wildcard patterns when resource names share a
    # common prefix (e.g. role/prod-app-1 + role/prod-app-2 -> role/prod-app-*).
    # Unrelated names (no shared prefix) are never collapsed.
    resourceOptimize:
      enabled: true

    # Removes statements that are wholly subsumed by another statement in the
    # same policy (same Effect + Condition, with actions that are a strict
    # subset of another statement's actions). Wildcard-aware: iam:Delete*
    # subsumes iam:DeleteRole without a catalog.
    # Default is enabled: false (opt-in). Set to true to activate.
    redundancyEliminate:
      enabled: true

    # Runs last. Splits the policy into multiple SCP documents when it still
    # exceeds AWS limits after all other passes. Set enabled: false to error
    # instead (equivalent to --no-split).
    split:
      enabled: true
      strategy: auto          # auto | never

    # Re-runs all passes in sequence until the minified document stops
    # changing or maxRounds is reached. Lets later passes (e.g.
    # conditionMerge) unlock earlier ones (e.g. statementMerge) on
    # subsequent rounds. Enabled by default.
    fixpoint:
      enabled: true
      maxRounds: 5            # maximum number of full-pipeline repetitions

  # ── Validation ─────────────────────────────────────────────────────
  # Tunes the severity of individual validation checks. Each rule accepts:
  #   error  - block optimization / validate and exit non-zero
  #   warn   - print a warning but continue
  #   ignore - suppress the check entirely
  validation:
    onWildcardAction: warn    # Action verb contains * or ? (bare Action "*" excluded)
    onBroadResource: warn     # Resource is "*" with no Condition
    onMissingSid: ignore      # statement has no Sid
    onUnknownService: warn    # unrecognised service prefix in an action string

  # ── Output ─────────────────────────────────────────────────────────
  output:
    backupSuffix: ".bak"      # suffix appended when writing in-place;
                              # set to "" to disable backups entirely
